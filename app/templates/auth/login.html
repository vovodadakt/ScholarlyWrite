{% extends "base.html" %}
{% block title %}登录 - ScholarlyWrite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h1 class="text-2xl font-semibold text-center mb-1">登录</h1>
    <p class="text-center mb-2 text-sm" style="color:var(--muted)">欢迎回到 ScholarlyWrite</p>

    {% if error %}
    <div class="mb-6 px-4 py-3 border text-sm" style="background:var(--error-bg); border-color:var(--error-border); color:var(--error-text); border-radius:6px;">
        {{ error }}
    </div>
    {% endif %}

    <div class="card" style="padding:2rem;">
        <form method="POST" action="/auth/login" class="space-y-5">
            <div>
                <label class="block text-sm mb-2" style="color:var(--muted)">邮箱</label>
                <input type="email" name="email" required autocomplete="email" class="input-field">
            </div>
            <div>
                <label class="block text-sm mb-2" style="color:var(--muted)">密码</label>
                <input type="password" name="password" required autocomplete="current-password" class="input-field">
            </div>
            <button type="submit" class="btn-primary w-full">登录</button>
        </form>
    </div>

    <p class="text-center mt-6 text-sm" style="color:var(--muted)">
        还没有账号？ <a href="/auth/register" style="color:var(--accent); text-decoration:none; font-weight:500;">立即注册</a>
    </p>
</div>
{% endblock %}
